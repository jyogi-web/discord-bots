version: '3.8'

# 全てのDiscord Botを一括管理
services:
  # Eyes-Lips Bot - :eyes: に反応するBot
  eyes-lips-bot:
    build:
      context: .
      dockerfile: bots/eyes-lips-bot/Containerfile
      target: production
    container_name: eyes-lips-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - bots/eyes-lips-bot/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - discord-bots

  # 将来的に追加するボットはここに記述
  # music-bot:
  #   build:
  #     context: .
  #     dockerfile: bots/music-bot/Containerfile
  #     target: production
  #   container_name: music-bot
  #   restart: unless-stopped
  #   environment:
  #     - NODE_ENV=production
  #   env_file:
  #     - bots/music-bot/.env
  #   networks:
  #     - discord-bots

# 共通ネットワーク（将来的にBot間通信が必要な場合に使用）
networks:
  discord-bots:
    driver: bridge
