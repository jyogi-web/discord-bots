version: '3.8'

services:
  # toy-bear-bot - じょぎ用統合Bot（kawaii転送 / eyes-lips / gacha）
  toy-bear-bot:
    build:
      context: .
      dockerfile: apps/toy-bear-bot/Containerfile
      target: production
    container_name: toy-bear-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - apps/toy-bear-bot/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
